  version: "3.9"

  services:
    postgres:
      image: postgres:16-alpine
      container_name: sla_postgres_dev
      restart: unless-stopped
      environment:
        POSTGRES_USER: sla_user
        POSTGRES_PASSWORD: sla_password
        POSTGRES_DB: smart_log_analyzer
      volumes:
        - postgres_dev_data:/var/lib/postgresql/data
      ports:
        - "5432:5432"

    backend:
      build:
        context: ./backend
        dockerfile: Dockerfile.dev
      container_name: sla_backend_dev
      restart: unless-stopped
      env_file:
        - .env
      volumes:
        - ./backend:/app
        - upload_dev_data:/app/uploads
      ports:
        - "8000:8000"
      depends_on:
        - postgres
      command: >
        sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

    frontend:
      image: node:20-alpine
      container_name: sla_frontend_dev
      working_dir: /app
      volumes:
        - ./frontend:/app
        - /app/node_modules
      ports:
        - "5173:5173"
      depends_on:
        - backend
      command: sh -c "npm install && npm run dev -- --host"

  volumes:
    postgres_dev_data:
    upload_dev_data:
